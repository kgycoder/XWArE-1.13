name: Build XWare APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: ☕ JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Gradle Wrapper JAR 준비
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: 🔑 Android Debug Keystore 생성
        # 서명에 필요한 debug.keystore 를 CI 환경에서 생성
        # (로컬에서는 Android SDK 설치 시 자동 생성됨)
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -noprompt
          echo "✅ debug.keystore 생성 완료"

      - name: 📦 Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔨 Release APK 빌드
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 🔨 Debug APK 빌드
        run: ./gradlew assembleDebug --no-daemon

      - name: 📋 생성된 APK 목록
        run: find app/build/outputs/apk -name "*.apk" -type f

      - name: 📤 Release APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: XWare-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: 📤 Debug APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: XWare-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 🏷️ GitHub Release 생성 (태그 push 시)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          name: XWare ${{ github.ref_name }}
          body: |
            ## X-WARE Android ${{ github.ref_name }}

            **📱 설치 방법**
            1. `XWare-*-release.apk` 또는 `XWare-*-debug.apk` 다운로드
            2. 안드로이드 설정 → 보안 → "알 수 없는 출처 허용"
            3. APK 파일 실행하여 설치
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
